      function update(){
        if((revealing==true || guessing==true) && itsmoving==false){
             boxes.forEach(b => {
              if(b.y>=65){
                console.log(b.y);
                guessing=false
                revealing=false;
                itsmoving=true;
              }
            //going up or down
            if (b.goingdown) {
              if (b.y+b.height>=canvas_height) {
                b.goingdown=false
              } else {
                b.y+=speed
              }
            } else {
              if (b.y<=0) {
                b.goingdown=true
              } else {
                b.y-=speed
              }
            }
          });}


        if (itsmoving && count<1000) {
          boxes.forEach(b => {
            if (count<b.moves.length) {
              b.x=b.moves[count].x;
              b.y=b.moves[count].y;
            }
          });
          count++;
          if(count>=boxes[0].moves.length&&count>=boxes[1].moves.length&&count>=boxes[2].moves.length){
            itsmoving=false
          }
    }
        }

      function draw(){
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(revealing==true && itsmoving==false){
          ctx.drawImage(cat_img, boxes[n].moves[0].x+5, boxes[n].moves[0].y+5, boxes[n].width-20, boxes[n].height-20);
        }
        if(guessing==true){

        }
        boxes.forEach(b => {
          ctx.drawImage(img, b.x, b.y, b.width, b.height)
        });
        
      }
      function gameLoop() {

      draw();
      requestAnimationFrame(gameLoop);

<!DOCTYPE html>
<html>
<head>
	<style>
	  body{
	  	text-align:center;font-family:arial black;
    background-image: url("Picture1.jpg");
      background-size:cover;
      background-position:center;
      backround-repeat:no-repeat; 
      color:white;
      padding-top: 150px
	  }
	  .settings-box{width: 300px;margin:auto;margin-top:120px;padding:40px;background:#f5a3a3;border-radius: 30px;}

	  .okBtn{background:#5ec6d6;color:white;border-color:white;border:solid 1px;}
	  .switch{position:relative;display:inline-block;width:60px; height:34px;}
	  .switch input{opacity:0;width:0;height:0;}
	  .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#ccc;transition:.4s;border-radius:34px; }

   .slider:before {position:absolute;content:"";height:26px;width:26px;left:4px;botton:4px;background-color:white;transition:.4s;border-radius:50px; }
    input:checked+ .slider{background-color:#ff6fae;}
   input:checked+ .slider:before{transform:translateX(26px);}
   h1{border-radius: 30px;background:#a39f9e;padding:10px 25px;display:inline-block;box-shadow:0px 4px 10px rgba(0,0,0,0.2);font-size:22px;}

</style>

</head>
<body>
	<div class="settings-box">

<script> const game_music = new Audio("game.mp3");
var music= false;
	function toggleMusic(){
		var btn = document.getElementById("musicBtn");
	if(btn.innerHTML == "ON"){
		btn.innerHTML = "OFF";
		
	}
  else{btn.innerHTML="ON";
  
} 

}
function toggleSound(){
	var btn=document.getElementById("soundBtn");
	if(btn.innerHTML=="ON"){btn.innerHTML="OFF";}
	else{ btn.innerHTML="ON"}
}
function change_music(){
	if (music==false) {
		music=true;
		game_music.play();}
	else{
		music=false;
		game_music.pause();
	}
	}

	
</script>
